                  target="_blank"

                <a

                  target="_blank"

              </li>
              <li class="lang-dropdown">
                <button id="lang-toggle"></button>
                <div class="lang-menu">
                  <button class="change-lang" data-lang="uk"></button>
                  <button class="change-lang" data-lang="en"></button>
                  <button class="change-lang" data-lang="fr"></button>
                </div>
                <script src="scripts/lang.js"></script>
              </li>
            </ul>
          </nav>
        </div>

      <section class="hero" id="hero">
        <div class="hero-inner">
          <div class="hero-logo">
            <img src="../images/LF_logo.svg" alt="Lingua Fortuna logo" />
